<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow - Produtividade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <!-- Cabeçalho -->
      <header class="header">
        <div class="header-inner">
          <h1 class="logo-text">Task<span class="gold">Flow</span></h1>
          <nav class="tabs">
            <button class="tab active" data-tab="dashboard">Dashboard</button>
            <button class="tab" data-tab="tarefas">Tarefas</button>
          </nav>
        </div>
      </header>

      <!-- Aba Dashboard -->
      <section id="dashboard" class="tab-content active">
        <!-- Cards de estatísticas -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">&#9670;</div>
            <div class="stat-value" id="stat-progress">0%</div>
            <div class="stat-label">Progresso Geral</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#9881;</div>
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">Pendentes</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#10003;</div>
            <div class="stat-value" id="stat-done">0</div>
            <div class="stat-label">Concluídas</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#9888;</div>
            <div class="stat-value" id="stat-overdue">0</div>
            <div class="stat-label">Atrasadas</div>
          </div>
        </div>

        <!-- Gráfico de barras -->
        <div class="chart-section">
          <h2 class="section-title">Tarefas por Prioridade</h2>
          <div class="bar-chart">
            <div class="bar-group">
              <div class="bar-label">Alta</div>
              <div class="bar-track">
                <div class="bar bar-high" id="bar-high" style="width:0%"></div>
              </div>
              <div class="bar-value" id="bar-high-val">0</div>
            </div>
            <div class="bar-group">
              <div class="bar-label">Média</div>
              <div class="bar-track">
                <div class="bar bar-medium" id="bar-medium" style="width:0%"></div>
              </div>
              <div class="bar-value" id="bar-medium-val">0</div>
            </div>
            <div class="bar-group">
              <div class="bar-label">Baixa</div>
              <div class="bar-track">
                <div class="bar bar-low" id="bar-low" style="width:0%"></div>
              </div>
              <div class="bar-value" id="bar-low-val">0</div>
            </div>
          </div>
        </div>

        <!-- Tarefas recentes -->
        <div class="recent-section">
          <h2 class="section-title">Tarefas Recentes</h2>
          <div id="recent-list" class="recent-list"></div>
        </div>
      </section>

      <!-- Aba Tarefas -->
      <section id="tarefas" class="tab-content">
        <!-- Formulário -->
        <div class="form-section">
          <h2 class="section-title">Nova Tarefa</h2>
          <form id="task-form" class="task-form">
            <div class="form-row">
              <input type="text" id="inp-name" placeholder="Nome da tarefa *" class="form-input" />
              <select id="inp-category" class="form-select">
                <option value="Pessoal">Pessoal</option>
                <option value="Estudo">Estudo</option>
                <option value="Trabalho">Trabalho</option>
                <option value="Saúde">Saúde</option>
                <option value="Finanças">Finanças</option>
              </select>
            </div>
            <div class="form-row">
              <select id="inp-priority" class="form-select">
                <option value="Alta">Alta</option>
                <option value="Média">Média</option>
                <option value="Baixa">Baixa</option>
              </select>
              <input type="date" id="inp-deadline" class="form-input" />
              <button type="submit" class="btn-gold">Adicionar</button>
            </div>
            <div id="form-error" class="form-error"></div>
          </form>
        </div>

        <!-- Filtros -->
        <div class="filters-section">
          <input type="text" id="filter-search" placeholder="Buscar tarefa..." class="form-input filter-search" />
          <select id="filter-priority" class="form-select filter-select">
            <option value="">Prioridade</option>
            <option value="Alta">Alta</option>
            <option value="Média">Média</option>
            <option value="Baixa">Baixa</option>
          </select>
          <select id="filter-status" class="form-select filter-select">
            <option value="">Status</option>
            <option value="pendente">Pendente</option>
            <option value="concluída">Concluída</option>
          </select>
        </div>

        <!-- Lista de tarefas -->
        <div id="task-list" class="task-list"></div>
      </section>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
